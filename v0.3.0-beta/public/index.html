<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4ead5" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' ws://localhost:* http://localhost:*;" />
  <title>BackupDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f4ead5;
      --paper-2: #ede0bf;
      --ink: #1a1a1a;
      --ink-soft: #3a3a3a;
      --rule: #1a1a1a;
      --accent: #c8472b;
      --accent-2: #e8a02f;
      --sage: #6b8e5a;
      --brick: #a83b2a;
      --shadow: rgba(26, 26, 26, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    body {
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(26,26,26,0.015) 2px, rgba(26,26,26,0.015) 3px);
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: var(--paper-2);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ink);
      border: 2px solid var(--paper-2);
    }

    ::selection {
      background: var(--ink);
      color: var(--paper);
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
